<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Banner to DocStar</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 15px 0;
      font-size: 16px;
      color: #333;
    }
    
    .status {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .status.info {
      background-color: #e3f2fd;
      border: 1px solid #2196F3;
      color: #1565C0;
    }
    
    .status.success {
      background-color: #e8f5e9;
      border: 1px solid #4CAF50;
      color: #2E7D32;
    }
    
    .status.error {
      background-color: #ffebee;
      border: 1px solid #f44336;
      color: #c62828;
    }
    
    .invoice-display {
      padding: 10px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    
    button:hover {
      background-color: #0052a3;
    }
    
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h2>🔗 Banner to DocStar</h2>
  
  <div id="content">
    <div class="loading">Loading...</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
